<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="https://assets.papegames.com/nikkiweb/infinitynikki/infinitynikkistrategycn/_next/static/media/favicon.cff3fb99.ico">
  <title>无限暖暖 · 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      font-family: "MiSans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    /* 视频背景层 */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    /* 半透明遮罩,保证卡片可读性 */
    .bg-mask {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.55) 100%);
      z-index: 1;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      min-height: 100vh;
    }
    main { position: relative; z-index: 2; width: 100%; display: flex; justify-content: center; }
    .card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 12px;
      display: block;
      border-radius: 50%;
      box-shadow: 0 4px 16px rgba(233, 30, 99, 0.25);
    }
    .brand-name {
      font-size: 26px;
      font-weight: 700;
      color: #c2185b;
      letter-spacing: 2px;
    }
    .brand-sub {
      font-size: 13px;
      color: #e91e63;
      margin-top: 6px;
      opacity: 0.7;
    }
    .field { margin-bottom: 18px; }
    .field-label {
      display: block;
      font-size: 13px;
      color: #880e4f;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .input-row { display: flex; gap: 10px; align-items: stretch; }
    .input {
      flex: 1;
      padding: 14px 16px;
      border: 2px solid #f8bbd0;
      border-radius: 12px;
      font-size: 16px;
      color: #333;
      background: #fff;
      transition: border-color 0.2s;
      outline: none;
    }
    .input:focus { border-color: #e91e63; }
    .input:disabled { background: #f5f5f5; color: #999; }
    .send-btn {
      padding: 0 20px;
      border: none;
      border-radius: 12px;
      background: #f8bbd0;
      color: #880e4f;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .send-btn:hover:not(:disabled) { background: #f48fb1; }
    .send-btn:disabled { background: #e0e0e0; color: #999; cursor: not-allowed; }
    .submit-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #e91e63 0%, #c2185b 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(233, 30, 99, 0.4); }
    .submit-btn:disabled { background: #e0e0e0; cursor: not-allowed; transform: none; box-shadow: none; }
    .status {
      margin-top: 16px;
      padding: 0 4px;
      font-size: 14px;
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .status.show { opacity: 1; }
    .status.ok { color: #2e7d32; }
    .status.fail { color: #c62828; }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #ad1457;
      opacity: 0.6;
    }
    .footer code {
      background: #fce4ec;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <!-- 视频背景 -->
  <video class="bg-video" autoplay muted loop playsinline preload="auto"
         poster="https://assets.papegames.com/nikkiweb/infinitynikki/infinitynikkistrategycn/_next/static/media/favicon.cff3fb99.ico">
    <source src="https://assets.papegames.com/resources/cdn/20260526/9a842e53dc90d58a.mp4" type="video/mp4">
  </video>
  <div class="bg-mask"></div>

  <main>
    <section class="card">
      <header class="brand">
        <img class="brand-logo"
             src="https://assets.papegames.com/nikkiweb/infinitynikki/infinitynikkistrategycn/_next/static/media/favicon.cff3fb99.ico"
             alt="无限暖暖">
        <div class="brand-name">无限暖暖</div>
        <div class="brand-sub">Infinity Nikki · 奇想手账登录</div>
      </header>

      <form onsubmit="return false">
        <div class="field">
          <label class="field-label" for="mobile">手机号</label>
          <div class="input-row">
            <input class="input" id="mobile" type="tel" inputmode="numeric" placeholder="请输入手机号" autocomplete="tel" maxlength="11">
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="code">验证码</label>
          <div class="input-row">
            <input class="input" id="code" type="text" inputmode="numeric" placeholder="请输入验证码" maxlength="8">
            <button class="send-btn" id="sendBtn" type="button" disabled>获取</button>
          </div>
        </div>

        <button class="submit-btn" id="loginBtn" type="button" disabled>完成登录</button>

        <div class="status" id="status"></div>
      </form>

      <p class="footer">
        会话 <code>{{ user_id }}</code> · 链接有时效
      </p>
    </section>
  </main>

  <script>
    const AUTH = {{ auth | tojson }};
    const MSG = {{ msg | tojson }};
    const $ = (id) => document.getElementById(id);
    const mobile = $('mobile');
    const code = $('code');
    const sendBtn = $('sendBtn');
    const loginBtn = $('loginBtn');
    const statusEl = $('status');

    function showStatus(msg, ok) {
      statusEl.textContent = msg;
      statusEl.className = `status show ${ok ? 'ok' : 'fail'}`;
    }

    function onlyDigits(el, max) {
      el.addEventListener('input', () => {
        const cleaned = el.value.replace(/\D/g, '').slice(0, max);
        if (cleaned !== el.value) el.value = cleaned;
        validate();
      });
    }

    function validate() {
      const phoneOk = /^1\d{10}$/.test(mobile.value);
      const codeOk = /^\d{4,8}$/.test(code.value);
      sendBtn.disabled = !phoneOk || sendBtn.dataset.cooldown === '1';
      loginBtn.disabled = !(phoneOk && codeOk);
    }

    onlyDigits(mobile, 11);
    onlyDigits(code, 8);

    sendBtn.addEventListener('click', async () => {
      sendBtn.dataset.cooldown = '1';
      sendBtn.disabled = true;
      let remain = 60;
      const timer = setInterval(() => {
        sendBtn.textContent = `${remain}s`;
        remain -= 1;
        if (remain < 0) {
          clearInterval(timer);
          sendBtn.textContent = '获取';
          sendBtn.dataset.cooldown = '0';
          validate();
        }
      }, 1000);

      const reply = await fetch('/niki/sendSmsCode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ auth: AUTH, mobile: mobile.value.trim() }),
      }).then((r) => r.json());
      showStatus(reply.msg || (reply.ok ? MSG.smsSent : MSG.smsSendFailed), !!reply.ok);
    });

    loginBtn.addEventListener('click', async () => {
      loginBtn.disabled = true;
      const origin = loginBtn.textContent;
      loginBtn.textContent = '验证中';
      const reply = await fetch('/niki/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ auth: AUTH, mobile: mobile.value.trim(), code: code.value.trim() }),
      }).then((r) => r.json());
      if (reply.ok) {
        mobile.disabled = true;
        code.disabled = true;
        sendBtn.disabled = true;
        loginBtn.textContent = MSG.loginSuccess;
        showStatus(MSG.loginSuccess, true);
        window.location.replace('/niki/done');
        return;
      }
      loginBtn.textContent = origin;
      validate();
      showStatus(reply.msg || MSG.loginFailed, false);
    });

    validate();
  </script>
</body>
</html>
