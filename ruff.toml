line-length = 120
target-version = "py311"

[lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[lint.isort]
combine-as-imports = true
length-sort = true
known-first-party = ["gsuid_core"]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
